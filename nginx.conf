server {
    listen 80;
    server_name _;
    
    location / {
        root /app/public;
        try_files $uri $uri/ /index.html;
    }
    
    location /api/ {
        proxy_pass http://127.0.0.1:5000;  
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /r/ {
        proxy_pass http://127.0.0.1:5000;  
        proxy_set_header Host $host;
    }
    
    location /ping {
        proxy_pass http://127.0.0.1:5000;  
    }
    
    location /health {
        proxy_pass http://127.0.0.1:5000; 
    }
}